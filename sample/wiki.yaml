# Minimal sample vault for the SPARQL sandbox template.
vault:
  inputs:
    - wiki
  filename_pattern: "[A-Za-z0-9_()-]+\\.md"

graph:
  content_predicate: schema:articleBody
  context:
    schema: https://schema.org/
    wiki: https://wazootech.github.io/wiki-sparql-sandbox/sample/wiki/
    rdf: http://www.w3.org/1999/02/22-rdf-syntax-ns#
    xsd: http://www.w3.org/2001/XMLSchema#

# Enable for live mode: wiki serve -c sample/wiki.yaml
sparql_service:
  enabled: true
  path: /api/sparql

site:
  base_url: /wiki-sparql-sandbox
  url_style: dir

link:
  style: markdown

lint:
  broken_links: warning
  filename_pattern: warning
