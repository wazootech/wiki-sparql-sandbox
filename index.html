<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Wiki SPARQL sandbox</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/yasgui@3.8.0/yasgui.min.css" />
    <style>
      :root {
        color-scheme: light dark;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      }
      body {
        margin: 0;
        background: #0f172a;
        color: #e2e8f0;
      }
      header {
        padding: 0.75rem 1rem;
        background: #111827;
        border-bottom: 1px solid #334155;
        display: flex;
        flex-wrap: wrap;
        gap: 0.75rem 1.25rem;
        align-items: center;
      }
      header h1 {
        margin: 0;
        font-size: 1rem;
        font-weight: 600;
      }
      header p {
        margin: 0;
        font-size: 0.875rem;
        color: #94a3b8;
      }
      header code {
        font-size: 0.8rem;
        color: #cbd5e1;
      }
      #yasgui {
        height: calc(100vh - 4.5rem);
      }
      .mode-live {
        color: #86efac;
      }
      .mode-static {
        color: #93c5fd;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Wiki SPARQL sandbox</h1>
      <p id="mode-banner"></p>
      <p>Endpoint: <code id="endpoint-label"></code></p>
    </header>
    <div id="yasgui"></div>

    <script src="https://cdn.jsdelivr.net/npm/yasgui@3.8.0/yasgui.min.js"></script>
    <script>
      (function () {
        const params = new URLSearchParams(window.location.search);
        const host = window.location.hostname;
        const isLocal =
          host === "localhost" || host === "127.0.0.1" || host === "";

        const mode = params.get("mode") || (isLocal ? "live" : "static");
        const dataTtl = new URL(
          params.get("data") || "data/vault.ttl",
          window.location.href
        ).href;

        let endpoint = params.get("endpoint");
        if (!endpoint) {
          endpoint =
            mode === "live"
              ? "http://127.0.0.1:8080/api/sparql"
              : dataTtl;
        }

        const banner = document.getElementById("mode-banner");
        const endpointLabel = document.getElementById("endpoint-label");
        endpointLabel.textContent = endpoint;

        if (mode === "live") {
          banner.innerHTML =
            '<span class="mode-live">Live mode</span> — point YASGUI at <code>wiki serve</code> with <code>sparql_service.enabled: true</code>.';
        } else {
          banner.innerHTML =
            '<span class="mode-static">Static mode</span> — pre-exported graph at <code>data/vault.ttl</code>. For GitHub Pages, run <code>wiki serve -c sample/wiki.yaml</code> locally and open <code>?mode=live</code>, or query the TTL with <code>wiki query</code>.';
        }

        const defaultQuery = `PREFIX schema: <https://schema.org/>

SELECT ?person ?given ?family WHERE {
  ?person a schema:Person .
  ?person schema:givenName ?given .
  ?person schema:familyName ?family .
}
ORDER BY ?family`;

        const yasgui = new Yasgui(document.getElementById("yasgui"), {
          requestConfig: {
            endpoint: endpoint,
          },
          yasqe: {
            value: defaultQuery,
          },
        });
      })();
    </script>
  </body>
</html>
